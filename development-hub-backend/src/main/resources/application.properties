spring.application.name=development-hub-backend
server.port=8080

# Do not commit real credentials. Configure these via environment variables or external config.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/attendance_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis-plus.mapper-locations=classpath:/mapper/**/*.xml
mybatis-plus.type-aliases-package=xin.rexy.developmenthubbackend.model.entity,xin.rexy.developmenthubbackend.model.response
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.banner=false

spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.time=HH:mm:ss
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss

app.jwt.secret=${JWT_SECRET:attendance-system-dev-jwt-secret-key-please-change}
app.jwt.expiration-seconds=${JWT_EXPIRE_SECONDS:86400}

# Spring AI / OpenAI-compatible gateway
# Spring AI 会自动拼接默认的 /v1/chat/completions
# 所以这里的 base-url 用主域名，不要再额外重复写一次 /v1
# 示例: https://api.openai.com
spring.ai.openai.base-url=${OPENAI_BASE_URL:}
spring.ai.openai.api-key=${OPENAI_API_KEY:disabled-key}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
